<h2 mat-dialog-title xmlns="http://www.w3.org/1999/html">Create a new Pizza </h2>
<mat-dialog-content>
  <p>What's your pizza?</p>
  <form [formGroup]="form">
    <mat-form-field appearance="fill">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name"/>
      <mat-error *ngIf="form.get('name')?.invalid">Name is required</mat-error>
    </mat-form-field>

    <br/>

    <mat-form-field appearance="fill">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description"/>
      <mat-error *ngIf="form.get('description')?.invalid">Description is required</mat-error>
    </mat-form-field>

    <br/>

    <mat-form-field appearance="fill">
      <mat-label>Price</mat-label>
      <input type="number" matInput formControlName="price"/>
      <mat-error *ngIf="form.get('price')?.invalid">Price is required</mat-error>
    </mat-form-field>

    <br/>

    <mat-form-field appearance="fill">
      <mat-label>Image Url</mat-label>
      <input matInput formControlName="imageUrl"/>
      <mat-error *ngIf="form.get('imageUrl')?.invalid">imageUrl is required</mat-error>
    </mat-form-field>

    <br/>

    <mat-form-field appearance="fill">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option value="MEAT">Meat</mat-option>
        <mat-option value="FISH">Fish</mat-option>
        <mat-option value="VEGAN">Vegan</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('category')?.invalid">Category is required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">No Thanks</button>
  <button mat-button (click)="onSave()">Ok</button>
</mat-dialog-actions>
