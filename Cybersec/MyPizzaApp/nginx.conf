worker_processes  1;
# Refers to single threaded process. Generally set to be equal to the number of CPUs or cores.

events {
    worker_connections  1024;
    # worker_processes and worker_connections allows you to calculate maxclients value:
    # max_clients = worker_processes * worker_connections
}

http {
    include       mime.types;

    default_type  application/octet-stream;

    sendfile        on;

    keepalive_timeout  65;

    server {
        listen       80;
        listen       443 ssl;
        server_name  app1.tiweb.tp.ubik.academy;
        ssl_certificate     app1.tiweb.tp.ubik.academy.crt;
        ssl_certificate_key app1.tiweb.tp.ubik.academy.key;
        location /api {
            # adjust port of backend to desired port
            proxy_pass http://backend:7465;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto "https";
            rewrite ^/api(.*)$ $1 break;
        }

        location / {
            root  /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }


    }
}